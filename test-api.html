<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Test API - Meni Inženjer</h1>
    <button onclick="testiraj()">Pošalji zahtev</button>
    <pre id="rezultat" style="background:#f4f4f4;padding:1rem;margin-top:1rem;">Čekam...</pre>

    <script>
        async function testiraj() {
            const url = "https://eozsw312b5tnw28.m.pipedream.net";
            document.getElementById('rezultat').innerText = "Šaljem zahtev...";

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        jelo: "Musaka",
                        restoran: "Balkanska",
                        sastojci: "krompir, meso",
                        kreativnost: 2
                    })
                });

                const data = await response.json();
                document.getElementById('rezultat').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('rezultat').innerText = "Greška: " + error.message;
            }
        }
    </script>
</body>
</html>
