<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meni Inženjer - Demo Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f7f9fa; color: #333; margin: 0; padding: 20px; }
        .chat-container { max-width: 600px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #d9534f; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 12px; background-color: #d9534f; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #c9302c; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .result-box { margin-top: 25px; padding: 15px; border-left: 5px solid #d9534f; background-color: #fdf7f7; border-radius: 4px; display: none; }
        .result-title { font-weight: bold; margin-bottom: 5px; color: #c9302c; }
        .loader { text-align: center; display: none; color: #666; font-style: italic; margin-top: 15px; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Meni Inženjer 🍳</h2>
    <p class="subtitle">AI generator profesionalnih opisa jela - Šef Vlada</p>
    
    <div class="form-group">
        <label for="jelo">Naziv jela (obavezno):</label>
        <input type="text" id="jelo" placeholder="Npr. Karađorđeva šnicla, Teleća čorba...">
    </div>
    
    <div class="form-group">
        <label for="restoran">Naziv restorana:</label>
        <input type="text" id="restoran" value="Moj Kućni Svet">
    </div>
    
    <div class="form-group">
        <label for="sastojci">Glavni sastojci:</label>
        <input type="text" id="sastojci" placeholder="Npr. svinjski file, kajmak, prezle...">
    </div>
    
    <div class="form-group">
        <label for="kreativnost">Nivo kreativnosti šefa:</label>
        <select id="kreativnost">
            <option value="visoka">Visoka (Kreativni i poetični opisi)</option>
            <option value="standardna">Standardna (Tradicionalni i jasni opisi)</option>
        </select>
    </div>
    
    <button id="generisiBtn" onclick="generisiOpis()">Generiši Opis Jela</button>
    
    <div id="loader" class="loader">Šef Vlada piše opis, trenutak molim...</div>
    
    <div id="resultBox" class="result-box">
        <div class="result-title">Predlog opisa za vaš meni:</div>
        <div id="izlazTekst"></div>
    </div>
</div>

<script>
    async function generisiOpis() {
        const jelo = document.getElementById('jelo').value.trim();
        const restoran = document.getElementById('restoran').value.trim();
        const sastojci = document.getElementById('sastojci').value.trim();
        const kreativnost = document.getElementById('kreativnost').value;
        
        const btn = document.getElementById('generisiBtn');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('resultBox');
        const izlazTekst = document.getElementById('izlazTekst');
        
        if (!jelo) {
            alert('Molimo Vas unesite naziv jela.');
            return;
        }
        
        // Pametna linija: automatski koristi domen na kome se sajt nalazi (bilo Vercel ili lokalno)
        const apiUrl = window.location.origin + '/api/generisi';
        
        btn.disabled = true;
        loader.style.display = 'block';
        resultBox.style.display = 'none';
        
        try {
            const response = await fetch(`${apiUrl}?jelo=${encodeURIComponent(jelo)}&restoran=${encodeURIComponent(restoran)}&sastojci=${encodeURIComponent(sastojci)}&kreativnost=${kreativnost}`, {
                method: 'GET'
            });
            
            const data = await response.json();
            
            if (data.success) {
                izlazTekst.innerText = data.opis;
                resultBox.style.display = 'block';
                resultBox.style.borderLeftColor = '#d9534f';
            } else {
                izlazTekst.innerText = 'Greška: ' + (data.error || 'Nepoznata greška na serveru.');
                resultBox.style.display = 'block';
                resultBox.style.borderLeftColor = '#ff0000';
            }
        } catch (error) {
            izlazTekst.innerText = 'Sistem ne može da pristupi API-ju. Proverite da li je projekat uspešno postavljen na Vercel. Detalji: ' + error.message;
            resultBox.style.display = 'block';
            resultBox.style.borderLeftColor = '#ff0000';
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
