<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meni Inženjer – AI opis jela</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #1a2a3a;
        }

        .subtitle {
            color: #5a6874;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2d3e50;
        }

        input, select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
        }

        .radio-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #2d6a4f, #1b4d3e);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 24px;
            border-left: 4px solid #2d6a4f;
        }

        .result h3 {
            margin-bottom: 0.5rem;
            color: #2d3e50;
        }

        .result p {
            line-height: 1.5;
            color: #333;
        }

        .error {
            color: #d9534f;
            background: #fdf7f7;
            border-left-color: #d9534f;
        }

        .copy-btn {
            background: #e9ecef;
            color: #2d3e50;
            margin-top: 1rem;
            width: auto;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .status {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #6c7a86;
            text-align: center;
        }

        hr {
            margin: 2rem 0;
            border: none;
            border-top: 1px solid #eef2f6;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #2d6a4f;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🍽️ Meni Inženjer</h1>
        <div class="subtitle">AI generator prodajnih opisa jela – napravio kuvar sa 24 godine iskustva</div>

        <div class="form-group">
            <label>📝 Naziv jela *</label>
            <input type="text" id="jelo" placeholder="npr. Punjena paprika, Musaka, Karađorđeva šnicla" value="Musaka">
        </div>

        <div class="form-group">
            <label>🏠 Vrsta restorana *</label>
            <select id="restoran">
                <option value="Balkanska kuća">Balkanska kuća</option>
                <option value="Italijanski restoran">Italijanski restoran</option>
                <option value="Fast food">Fast food</option>
                <option value="Hotel / catering">Hotel / catering</option>
                <option value="Pečenjara / roštilj">Pečenjara / roštilj</option>
                <option value="Pekara">Pekara</option>
                <option value="Kafić / bar">Kafić / bar</option>
                <option value="Poslastičarnica">Poslastičarnica</option>
                <option value="Sea food restoran">Sea food restoran</option>
                <option value="Azijski restoran">Azijski restoran</option>
                <option value="Francuski restoran">Francuski restoran</option>
                <option value="Veganski restoran">Veganski restoran</option>
                <option value="Pub / pivnica">Pub / pivnica</option>
                <option value="Planinski dom">Planinski dom</option>
                <option value="Švedski sto / bife">Švedski sto / bife</option>
                <option value="Street food">Street food</option>
                <option value="Kineski restoran">Kineski restoran</option>
                <option value="Grčki restoran">Grčki restoran</option>
                <option value="Meksički restoran">Meksički restoran</option>
            </select>
        </div>

        <div class="form-group">
            <label>🥩 Sastojci (opciono)</label>
            <input type="text" id="sastojci" placeholder="npr. krompir, mleveno meso, začini" value="krompir, mleveno meso, začini">
        </div>

        <div class="form-group">
            <label>🎨 Nivo kreativnosti</label>
            <div class="radio-group" id="kreativnostGroup">
                <label><input type="radio" name="kreativnost" value="1"> Klasičan</label>
                <label><input type="radio" name="kreativnost" value="2" checked> Kreativan</label>
                <label><input type="radio" name="kreativnost" value="3"> Signature</label>
            </div>
        </div>

        <button id="generateBtn">✨ Generiši opis</button>

        <div id="resultArea" style="display: none;">
            <div class="result">
                <h3>📄 Generisani opis:</h3>
                <p id="resultText"></p>
                <button id="copyBtn" class="copy-btn">📋 Kopiraj opis</button>
            </div>
        </div>

        <div class="status" id="statusMsg">
            BASIC plan: 50 besplatnih opisa mesečno
        </div>

        <hr>

        <a href="/ugostiteljski-asistent/" class="back-link">← Nazad na Ugostiteljskog asistenta</a>
    </div>
</div>

<script>
    const API_URL = "https://eozsw312b5tnw28.m.pipedream.net";

    document.getElementById('generateBtn').addEventListener('click', async () => {
        const jelo = document.getElementById('jelo').value.trim();
        const restoran = document.getElementById('restoran').value;
        const sastojci = document.getElementById('sastojci').value.trim();
        const kreativnost = document.querySelector('input[name="kreativnost"]:checked')?.value || "2";

        if (!jelo) {
            alert("Molimo unesite naziv jela");
            return;
        }

        const btn = document.getElementById('generateBtn');
        const resultDiv = document.getElementById('resultArea');
        const resultText = document.getElementById('resultText');
        const statusMsg = document.getElementById('statusMsg');

        btn.disabled = true;
        btn.textContent = "⏳ Generišem...";
        resultDiv.style.display = "none";
        statusMsg.innerHTML = "🔮 Generišem opis, molim sačekajte nekoliko sekundi...";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ jelo, restoran, sastojci, kreativnost })
            });
            const data = await response.json();

            if (data.opis) {
                resultText.textContent = data.opis;
                resultDiv.style.display = "block";
                statusMsg.innerHTML = "✅ Opis uspešno generisan! BASIC plan: 50 besplatnih opisa mesečno.";
                resultDiv.querySelector('.result').classList.remove('error');
            } else if (data.error) {
                resultText.textContent = "❌ Greška: " + data.error;
                resultDiv.style.display = "block";
                resultDiv.querySelector('.result').classList.add('error');
                statusMsg.innerHTML = "⚠️ " + data.error;
            } else {
                throw new Error("Nepoznat odgovor API-ja");
            }
        } catch (error) {
            resultText.textContent = "❌ Došlo je do greške: " + error.message;
            resultDiv.style.display = "block";
            resultDiv.querySelector('.result').classList.add('error');
            statusMsg.innerHTML = "⚠️ Greška pri povezivanju sa API-jem. Pokušajte ponovo.";
        } finally {
            btn.disabled = false;
            btn.textContent = "✨ Generiši opis";
        }
    });

    document.getElementById('copyBtn')?.addEventListener('click', () => {
        const text = document.getElementById('resultText').textContent;
        navigator.clipboard.writeText(text);
        alert("Opis kopiran u clipboard!");
    });
</script>
</body>
</html>
