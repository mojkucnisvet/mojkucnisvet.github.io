<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Ugostiteljski AI Agent - Meni Inženjer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <!-- Zaglavlje -->
        <div class="bg-slate-900 p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-tight">🤖 Ugostiteljski AI Agent</h1>
            <p class="text-slate-400 text-sm mt-1">Modul 1: Meni Inženjer — Profesionalno pisanje jelovnika</p>
        </div>

        <!-- Forma -->
        <div class="p-6 space-y-4">
            <!-- Naziv jela -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Naziv jela *</label>
                <input type="text" id="jelo" placeholder="Npr. Sarma, Musaka, Biftek..." 
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-900 transition text-sm">
            </div>

            <!-- Vrsta restorana -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Vrsta restorana *</label>
                <select id="restoran" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-900 transition text-sm bg-white">
                    <optgroup label="Domaće i tradicionalne">
                        <option value="Nacionalni/Tradicionalni">🥘 Nacionalni/Tradicionalni — srpska, balkanska</option>
                    </optgroup>
                    <optgroup label="Mediteranske i evropske">
                        <option value="Italijanski">🍝 Italijanski — paste, pizze, mediteranski ukusi</option>
                        <option value="Francuski">🥐 Francuski — prefinjeno, klasično, sofisticirano</option>
                        <option value="Grčki/Mediteranski">🥙 Grčki/Mediteranski — giros, suvlaki, moussaka</option>
                        <option value="Picerija">🍕 Picerija — tanke kore, kamen, mozzarella</option>
                    </optgroup>
                    <optgroup label="Azijske">
                        <option value="Japanski/Sushi">🍣 Japanski/Sushi — minimalistički, elegantno</option>
                        <option value="Kineski">🥡 Kineski — wok, slatko-kiselo</option>
                        <option value="Indijski">🍛 Indijski — začinjeno, kari, tandoor</option>
                        <option value="Tajlandski/Vijetnamski">🍜 Tajlandski/Vijetnamski — limunova trava, kokos</option>
                    </optgroup>
                    <optgroup label="Ležerne i brze">
                        <option value="Street & Fast Food">🍔 Street & Fast Food — brzo, sočno, urbano</option>
                        <option value="Pekara">🥨 Pekara — burek, kroasani, hleb, peciva</option>
                    </optgroup>
                    <optgroup label="Specijalizovane">
                        <option value="Kafić">☕ Kafić — kafa, čaj, sendviči, palačinke</option>
                        <option value="Poslastičarnica">🍰 Poslastičarnica — kolači, sladoledi, torte</option>
                        <option value="Bar/Koktel bar">🍹 Bar/Koktel bar — kokteli, vina, grickalice</option>
                        <option value="Steakhouse">🥩 Steakhouse — meso, roštilj, bifteci</option>
                        <option value="Hotelski restoran">🏨 Hotelski restoran — luksuzno, sofisticirano</option>
                    </optgroup>
                    <optgroup label="Egzotične i alternativne">
                        <option value="Meksički">🌮 Meksički — takosi, buritosi, guacamole</option>
                        <option value="Moderni fjužn">🥗 Moderni fjužn — spoj kultura, kreativno</option>
                        <option value="Vegan/Vegetarijanski">🌿 Vegan/Vegetarijanski — biljno, zdravo</option>
                    </optgroup>
                </select>
            </div>

            <!-- Ključni sastojci -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Ključni sastojci (opciono)</label>
                <input type="text" id="sastojci" placeholder="Npr. juneći bife, puter, ruzmarin..." 
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-900 transition text-sm">
            </div>

            <!-- Nivo kreativnosti -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nivo kreativnosti AI-ja</label>
                <select id="kreativnost" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-900 transition text-sm bg-white">
                    <option value="ekonomičan">Ekonomska</option>
                    <option value="standardan">Standardna</option>
                    <option value="visoka" selected>Visoka (Pro)</option>
                </select>
            </div>

            <!-- Dugme -->
            <button onclick="generisiOpis()" id="glavno-dugme" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 rounded-xl transition flex items-center justify-center gap-2 mt-2 text-sm cursor-pointer">
                Generiši Opis Jela
            </button>
        </div>

        <!-- Rezultat -->
        <div id="rezultat-sekcija" class="hidden border-t border-slate-100 bg-slate-50 p-6">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Predlog opisa:</h3>
            <div id="rezultat-tekst" class="bg-white p-4 rounded-xl border border-slate-100 text-sm leading-relaxed text-slate-700 shadow-sm whitespace-pre-line"></div>
        </div>
    </div>

    <script>
        async function generisiOpis() {
            const jelo = document.getElementById('jelo').value.trim();
            const restoran = document.getElementById('restoran').value;
            const sastojci = document.getElementById('sastojci').value.trim();
            const kreativnost = document.getElementById('kreativnost').value;
            const dugme = document.getElementById('glavno-dugme');
            const rezultatSekcija = document.getElementById('rezultat-sekcija');
            const rezultatTekst = document.getElementById('rezultat-tekst');

            if (!jelo) {
                alert('Molimo vas unesite naziv jela.');
                return;
            }

            dugme.disabled = true;
            dugme.innerText = 'Šef Vlada kreira opis...';

            try {
                // Slanje direktno na tvoj API bez obzira na poddomen
                const response = await fetch('/api/generisi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jelo: jelo,
                        restoran: restoran,
                        sastojci: sastojci || 'standardni sastojci',
                        kreativnost: kreativnost
                    })
                });

                const data = await response.json();

                if (data.success) {
                    rezultatTekst.innerText = data.opis;
                    rezultatSekcija.classList.remove('hidden');
                } else {
                    alert('Greška: ' + data.error);
                }
            } catch (error) {
                alert('Sistemska greška: ' + error.message);
            } finally {
                dugme.disabled = false;
                dugme.innerText = 'Generiši Opis Jela';
            }
        }
    </script>
</body>
</html>
