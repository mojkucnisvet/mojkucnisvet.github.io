<!DOCTYPE html>
<html>
<head>
    <title>Test Pipedream</title>
</head>
<body>
    <h2>Test direktnog poziva Pipedream-a</h2>
    <button onclick="test()">Pošalji zahtev</button>
    <pre id="rezultat" style="background:#eee; padding:1rem; margin-top:1rem;">Čekam...</pre>

    <script>
        async function test() {
            const url = "https://eozsw312b5tnw28.m.pipedream.net";
            document.getElementById('rezultat').innerText = "Šaljem...";

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ jelo: "Musaka", restoran: "Balkanska", sastojci: "krompir, meso", kreativnost: 2 })
                });

                const text = await response.text();
                document.getElementById('rezultat').innerText = "Odgovor (tekst):\n" + text;
            } catch (err) {
                document.getElementById('rezultat').innerText = "Greška: " + err.message;
            }
        }
    </script>
</body>
</html>
