<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/B test menija | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        input:focus, textarea:focus { border-color: #E65F19; }
        textarea { resize: vertical; min-height: 80px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .results { margin-top: 1.5rem; }
        .result-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; text-align: center; }
        .pobednik-badge { display: inline-block; background: linear-gradient(135deg, #E65F19, #CF5112); color: #fff; padding: 0.5rem 1.5rem; border-radius: 50px; font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
        .procenat { font-size: 2.5rem; font-weight: 800; color: #2ecc71; margin-bottom: 1rem; }
        .detail { margin-bottom: 0.5rem; }
        .detail-label { color: #707E94; font-size: 0.75rem; text-transform: uppercase; }
        .detail-value { color: #CBD5E1; font-size: 0.95rem; line-height: 1.5; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">A/B<span>Test</span></div>
</header>

<div class="container">
    <h1>A/B <span>test menija</span></h1>
    <p class="subtitle">Unesite dve verzije opisa za isto jelo. AI će analizirati i reći koja će se bolje prodavati.</p>

    <div class="card">
        <div class="form-group">
            <label>Naziv jela</label>
            <input type="text" id="jelo" placeholder="Npr. Pileći file sa povrćem">
        </div>
        <div class="row">
            <div class="form-group">
                <label>Verzija A</label>
                <textarea id="opisA" placeholder="Npr. Pileći file sa povrćem, 850 RSD"></textarea>
            </div>
            <div class="form-group">
                <label>Verzija B</label>
                <textarea id="opisB" placeholder="Npr. Sočni pileći file iz rerne sa sezonskim povrćem i notom belog luka, 850 RSD"></textarea>
            </div>
        </div>
        <button class="btn" id="testBtn" onclick="testiraj()">Uporedi verzije</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">Analiziram...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    async function testiraj() {
        const jelo = document.getElementById('jelo').value.trim();
        const opisA = document.getElementById('opisA').value.trim();
        const opisB = document.getElementById('opisB').value.trim();

        const errorBox = document.getElementById('errorBox');
        const results = document.getElementById('results');
        const spinner = document.getElementById('spinner');
        const btn = document.getElementById('testBtn');

        errorBox.classList.remove('show');
        results.style.display = 'none';
        results.innerHTML = '';

        if (!jelo) { errorBox.textContent = 'Unesite naziv jela.'; errorBox.classList.add('show'); return; }
        if (!opisA || !opisB) { errorBox.textContent = 'Unesite oba opisa (A i B).'; errorBox.classList.add('show'); return; }

        spinner.classList.add('show');
        btn.disabled = true;
        btn.textContent = 'Analiziram...';

        try {
            const response = await fetch('https://mojkucnisvet-github-io.vercel.app/api/ab-test', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jelo, opisA, opisB })
            });

            if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err.error || 'Greška.'); }

            const data = await response.json();

            const card = document.createElement('div');
            card.className = 'result-card';

            if (data.pobednik) {
                card.innerHTML = `
                    <div class="pobednik-badge">Pobednik: Verzija ${data.pobednik}</div>
                    ${data.procenat ? `<div class="procenat">+${data.procenat} bolja</div>` : ''}
                    ${data.zasto ? `<div class="detail"><span class="detail-label">Zašto:</span> <span class="detail-value">${data.zasto}</span></div>` : ''}
                    ${data.savet ? `<div class="detail" style="margin-top:0.8rem;"><span class="detail-label">Savet za slabiju verziju:</span> <span class="detail-value">${data.savet}</span></div>` : ''}
                    ${data.uticaj ? `<div class="detail" style="margin-top:0.8rem;"><span class="detail-value" style="color:#2ecc71;font-weight:700;">${data.uticaj}</span></div>` : ''}
                `;
            } else {
                card.innerHTML = `<div class="detail-value" style="color:#CBD5E1;line-height:1.6;">${data.zasto || 'Analiza nije uspela.'}</div>`;
            }

            results.appendChild(card);
            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            errorBox.textContent = 'Greška: ' + error.message;
            errorBox.classList.add('show');
        } finally {
            spinner.classList.remove('show');
            btn.disabled = false;
            btn.textContent = 'Uporedi verzije';
        }
    }
</script>

</body>
</html>
