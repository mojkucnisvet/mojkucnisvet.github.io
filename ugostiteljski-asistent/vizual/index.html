<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meni Inženjer Vizual | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        textarea { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; resize: vertical; min-height: 120px; }
        textarea:focus { border-color: #E65F19; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary { background: #0F1319; border: 1px solid #222C38; color: #94A3B8; margin-top: 0.5rem; }
        .btn-secondary:hover { border-color: #E65F19; color: #E65F19; }
        .upload-btn { background: #0F1319; border: 2px dashed #4A5568; color: #94A3B8; padding: 1.5rem; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-btn:hover { border-color: #E65F19; color: #E65F19; }
        .upload-btn input { display: none; }
        .preview-img { max-width: 100%; border-radius: 10px; margin-bottom: 1rem; display: none; border: 1px solid #222C38; }
        .results { margin-top: 1.5rem; }
        .meni-item { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 0.75rem; }
        .meni-item .jelo-naziv { font-size: 1.2rem; font-weight: 700; color: #E65F19; margin-bottom: 0.3rem; }
        .meni-item .jelo-opis { color: #CBD5E1; font-size: 0.95rem; margin-bottom: 0.3rem; }
        .meni-item .jelo-cena { font-size: 1rem; font-weight: 700; color: #2ecc71; }
        .napomena { background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; padding: 1rem; color: #94A3B8; font-size: 0.9rem; margin-top: 1rem; font-style: italic; }
        .action-buttons { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">Meni<span>Vizual</span></div>
</header>

<div class="container">
    <h1>Meni Inženjer <span>Vizual</span></h1>
    <p class="subtitle">Fotografišite svoj papirni meni ili unesite tekst ručno. AI ga digitalizuje i unapređuje opise.</p>

    <div class="card">
        <label class="upload-btn" id="uploadLabel">
            <div style="font-size:2rem;margin-bottom:0.5rem;">📸</div>
            <div style="font-weight:700;">Fotografiši meni</div>
            <div style="font-size:0.8rem;margin-top:0.3rem;">ili izaberi sliku iz galerije</div>
            <input type="file" accept="image/*" capture="environment" id="fileInput" onchange="handleImage(event)">
        </label>
        <img id="preview" class="preview-img" alt="Pregled slike">

        <div class="form-group" style="margin-top:1rem;">
            <label>Ili nalepite tekst menija ručno</label>
            <textarea id="tekst" placeholder="Nalepite ovde ceo tekst vašeg menija...&#10;&#10;Npr:&#10;Pileći file sa povrćem ...... 850&#10;Teleća čorba ...... 450"></textarea>
        </div>
        <button class="btn" id="genBtn" onclick="generate()">Unapredi meni</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">AI obrađuje meni...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    let imageBase64 = '';

    function handleImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview').src = e.target.result;
            document.getElementById('preview').style.display = 'block';
            imageBase64 = e.target.result.split(',')[1];
            document.getElementById('tekst').value = '';
            document.getElementById('uploadLabel').style.borderColor = '#2ecc71';
        };
        reader.readAsDataURL(file);
    }

    async function generate() {
        const tekst = document.getElementById('tekst').value.trim();

        const errorBox = document.getElementById('errorBox');
        const results = document.getElementById('results');
        const spinner = document.getElementById('spinner');
        const btn = document.getElementById('genBtn');

        errorBox.classList.remove('show');
        results.style.display = 'none';
        results.innerHTML = '';

        if (!tekst && !imageBase64) { errorBox.textContent = 'Unesite tekst menija ili otpremite sliku.'; errorBox.classList.add('show'); return; }

        spinner.classList.add('show');
        btn.disabled = true;
        btn.textContent = 'Obrađujem...';

        try {
            const response = await fetch('https://mojkucnisvet-github-io.vercel.app/api/vizual', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tekst: tekst || '', imageBase64: imageBase64 || '' })
            });

            if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err.error || 'Greška.'); }

            const data = await response.json();

            if (data.meni && data.meni.length > 0) {
                data.meni.forEach(j => {
                    const item = document.createElement('div');
                    item.className = 'meni-item';
                    item.innerHTML = `<div class="jelo-naziv">${j.jelo}</div><div class="jelo-opis">${j.opis}</div><div class="jelo-cena">${j.cena} RSD</div>`;
                    results.appendChild(item);
                });

                const actions = document.createElement('div');
                actions.className = 'action-buttons';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn btn-secondary';
                copyBtn.textContent = 'Kopiraj meni';
                copyBtn.onclick = () => {
                    const meniTekst = data.meni.map(j => `${j.jelo}\n${j.opis}\n${j.cena} RSD\n`).join('\n');
                    navigator.clipboard.writeText(meniTekst).then(() => {
                        copyBtn.textContent = 'Kopirano!';
                        setTimeout(() => copyBtn.textContent = 'Kopiraj meni', 2000);
                    });
                };
                actions.appendChild(copyBtn);

                if (navigator.share) {
                    const shareBtn = document.createElement('button');
                    shareBtn.className = 'btn btn-secondary';
                    shareBtn.textContent = 'Podeli meni';
                    shareBtn.onclick = () => {
                        const meniTekst = data.meni.map(j => `${j.jelo} - ${j.cena} RSD`).join('\n');
                        navigator.share({ title: 'Moj digitalni meni', text: meniTekst });
                    };
                    actions.appendChild(shareBtn);
                }
                results.appendChild(actions);
            }

            if (data.napomena) {
                const nap = document.createElement('div');
                nap.className = 'napomena';
                nap.textContent = data.napomena;
                results.appendChild(nap);
            }

            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            errorBox.textContent = 'Greška: ' + error.message;
            errorBox.classList.add('show');
        } finally {
            spinner.classList.remove('show');
            btn.disabled = false;
            btn.textContent = 'Unapredi meni';
        }
    }
</script>

</body>
</html>
