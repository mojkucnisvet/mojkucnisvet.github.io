<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meni Inženjer Vizual | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        textarea { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; resize: vertical; min-height: 100px; }
        textarea:focus { border-color: #E65F19; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary { background: #0F1319; border: 1px solid #222C38; color: #94A3B8; margin-top: 0.5rem; }
        .btn-secondary:hover { border-color: #E65F19; color: #E65F19; }
        .btn-outline { background: transparent; border: 1px solid #4A5568; color: #94A3B8; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .btn-outline:hover { border-color: #E65F19; color: #E65F19; }
        .upload-area { border: 2px dashed #4A5568; border-radius: 16px; padding: 2rem; text-align: center; transition: all 0.3s; cursor: pointer; position: relative; margin-bottom: 1rem; }
        .upload-area:hover { border-color: #E65F19; }
        .upload-area.has-image { border-style: solid; border-color: #2ecc71; padding: 0; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .upload-text { font-weight: 700; font-size: 1rem; }
        .upload-hint { font-size: 0.8rem; color: #707E94; margin-top: 0.3rem; }
        .image-preview { position: relative; }
        .image-preview img { width: 100%; border-radius: 14px; display: block; }
        .remove-image-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; background: rgba(239,68,68,0.9); color: #fff; border: none; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 2; }
        .remove-image-btn:hover { background: #ef4444; transform: scale(1.1); }
        .results { margin-top: 1.5rem; }
        .meni-item { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 0.75rem; }
        .meni-item .jelo-naziv { font-size: 1.2rem; font-weight: 700; color: #E65F19; margin-bottom: 0.3rem; }
        .meni-item .jelo-opis { color: #CBD5E1; font-size: 0.95rem; margin-bottom: 0.3rem; }
        .meni-item .jelo-cena { font-size: 1rem; font-weight: 700; color: #2ecc71; }
        .napomena { background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; padding: 1rem; color: #94A3B8; font-size: 0.9rem; margin-top: 1rem; font-style: italic; }
        .action-buttons { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">Meni<span>Vizual</span></div>
</header>

<div class="container">
    <h1>Meni Inženjer <span>Vizual</span></h1>
    <p class="subtitle">Fotografišite svoj papirni meni ili unesite tekst ručno. AI ga digitalizuje i unapređuje opise i cene.</p>

    <div class="card">
        <div class="upload-area" id="uploadArea">
            <div id="uploadPlaceholder" style="cursor:pointer;" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📸</div><div class="upload-text">Dodirnite da fotografišete meni</div><div class="upload-hint">ili izaberite sliku iz galerije</div>
            </div>
            <div class="image-preview" id="imagePreview" style="display:none;"><img id="preview" src="" alt="Pregled menija"><button class="remove-image-btn" onclick="removeImage(event)" title="Ukloni sliku">✕</button></div>
            <input type="file" accept="image/*" id="fileInput" onchange="handleImage(event)">
        </div>
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
            <button class="btn-outline" onclick="document.getElementById('fileInput').click()" style="flex:1;">📷 Kamera</button>
            <button class="btn-outline" onclick="pickFromGallery()" style="flex:1;">🖼️ Galerija</button>
        </div>
        <div class="form-group"><label>Ili nalepite tekst menija ručno</label><textarea id="tekst" placeholder="Nalepite ovde ceo tekst vašeg menija...&#10;&#10;Npr:&#10;Pileći file sa povrćem ...... 850&#10;Teleća čorba ...... 450&#10;Palačinke sa nutelom ...... 380"></textarea></div>
        <button class="btn" id="genBtn" onclick="generate()">Unapredi meni</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">AI obrađuje meni...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    let imageBase64='';
    function pickFromGallery(){const i=document.getElementById('fileInput');i.removeAttribute('capture');i.click()}
    function handleImage(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){document.getElementById('preview').src=ev.target.result;document.getElementById('imagePreview').style.display='block';document.getElementById('uploadPlaceholder').style.display='none';document.getElementById('uploadArea').classList.add('has-image');imageBase64=ev.target.result.split(',')[1];document.getElementById('tekst').value=''};r.readAsDataURL(f)}
    function removeImage(e){e.stopPropagation();imageBase64='';document.getElementById('fileInput').value='';document.getElementById('preview').src='';document.getElementById('imagePreview').style.display='none';document.getElementById('uploadPlaceholder').style.display='block';document.getElementById('uploadArea').classList.remove('has-image')}

    async function generate(){
        const tekst=document.getElementById('tekst').value.trim(),errorBox=document.getElementById('errorBox'),results=document.getElementById('results'),spinner=document.getElementById('spinner'),btn=document.getElementById('genBtn');
        errorBox.classList.remove('show');results.style.display='none';results.innerHTML='';
        if(!tekst&&!imageBase64){errorBox.textContent='Unesite tekst menija ili fotografišite meni.';errorBox.classList.add('show');return}
        spinner.classList.add('show');btn.disabled=true;btn.textContent='Obrađujem...';
        try{
            const r=await fetch('https://mojkucnisvet-github-io.vercel.app/api/index',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({modul:'vizual',tekst:tekst||'',imageBase64:imageBase64||''})});
            if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Greška.')}
            const d=await r.json();
            if(d.meni&&d.meni.length>0){d.meni.forEach(j=>{const it=document.createElement('div');it.className='meni-item';it.innerHTML=`<div class="jelo-naziv">${j.jelo||''}</div><div class="jelo-opis">${j.opis||''}</div><div class="jelo-cena">${j.cena?j.cena+' RSD':''}</div>`;results.appendChild(it)});
                const ac=document.createElement('div');ac.className='action-buttons';
                const cb=document.createElement('button');cb.className='btn btn-secondary';cb.textContent='Kopiraj meni';cb.onclick=()=>{const t=d.meni.map(j=>`${j.jelo}\n${j.opis}\n${j.cena} RSD\n`).join('\n');navigator.clipboard.writeText(t).then(()=>{cb.textContent='Kopirano!';setTimeout(()=>cb.textContent='Kopiraj meni',2000)})};ac.appendChild(cb);
                if(navigator.share){const sb=document.createElement('button');sb.className='btn btn-secondary';sb.textContent='Podeli meni';sb.onclick=()=>{const t=d.meni.map(j=>`${j.jelo} - ${j.cena} RSD`).join('\n');navigator.share({title:'Moj digitalni meni',text:t})};ac.appendChild(sb)}results.appendChild(ac)}
            if(d.napomena){const n=document.createElement('div');n.className='napomena';n.textContent=d.napomena;results.appendChild(n)}
            results.style.display='block';results.scrollIntoView({behavior:'smooth'});
        }catch(e){errorBox.textContent='Greška: '+e.message;errorBox.classList.add('show')}
        finally{spinner.classList.remove('show');btn.disabled=false;btn.textContent='Unapredi meni'}
    }
</script>

</body>
</html>
