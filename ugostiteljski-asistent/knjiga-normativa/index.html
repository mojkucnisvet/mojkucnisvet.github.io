<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knjiga normativa | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        input:focus, textarea:focus, select:focus { border-color: #E65F19; }
        textarea { resize: vertical; min-height: 80px; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary { background: #0F1319; border: 1px solid #222C38; color: #94A3B8; margin-top: 0.5rem; }
        .btn-secondary:hover { border-color: #E65F19; color: #E65F19; }
        .results { margin-top: 1.5rem; }
        .result-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 0.75rem; }
        .result-card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .result-card .porcije { font-size: 1.5rem; font-weight: 800; color: #E65F19; }
        .normativ-table { width: 100%; border-collapse: collapse; }
        .normativ-table th { color: #707E94; font-size: 0.7rem; text-transform: uppercase; text-align: left; padding: 0.5rem; border-bottom: 1px solid #222C38; }
        .normativ-table td { padding: 0.5rem; border-bottom: 1px solid #1a1f2b; font-size: 0.9rem; }
        .normativ-table td:last-child { text-align: right; color: #2ecc71; font-weight: 700; }
        .action-buttons { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .tab { flex: 1; padding: 0.7rem; text-align: center; border-radius: 10px; cursor: pointer; background: #0F1319; border: 1px solid #222C38; color: #707E94; font-weight: 700; font-size: 0.85rem; transition: all 0.3s; }
        .tab.active { background: #E65F19; color: #fff; border-color: #E65F19; }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">Knjiga<span>Normativa</span></div>
</header>

<div class="container">
    <h1>Knjiga <span>normativa</span></h1>
    <p class="subtitle">AI automatski piše normative za jela. Dva režima: gotov normativ ili preračun iz lonca.</p>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('normativ')">Gotov normativ</div>
        <div class="tab" onclick="switchTab('lonac')">Skuvao sam lonac</div>
    </div>

    <div id="tabNormativ">
        <div class="card">
            <div class="form-group"><label>Naziv jela</label><input type="text" id="jelo" placeholder="Npr. Goveđa čorba, Punjene paprike..."></div>
            <div class="form-group"><label>Sastojci</label><textarea id="sastojci" placeholder="Npr. goveđe meso, šargarepa, celer, crni luk, paradajz pire..."></textarea></div>
            <button class="btn" id="genBtn" onclick="generateNormativ()">Generiši normativ</button>
        </div>
    </div>

    <div id="tabLonac" style="display:none;">
        <div class="card">
            <div class="form-group"><label>Naziv jela</label><input type="text" id="jeloLonac" placeholder="Npr. Goveđa čorba"></div>
            <div class="form-group"><label>Ukupne količine u loncu</label><textarea id="ukupneKolicine" placeholder="Npr. goveđe meso 2kg, šargarepa 500g, celer 300g, crni luk 600g, paradajz pire 300g, voda 8L..."></textarea></div>
            <button class="btn" id="genBtnLonac" onclick="generateLonac()">Preračunaj porcije</button>
        </div>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">AI računa normative...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>2026 Ugostiteljski AI Agent</footer>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tabNormativ').style.display = tab === 'normativ' ? 'block' : 'none';
        document.getElementById('tabLonac').style.display = tab === 'lonac' ? 'block' : 'none';
        document.querySelectorAll('.tab')[tab === 'normativ' ? 0 : 1].classList.add('active');
    }

    async function generateNormativ() {
        const jelo = document.getElementById('jelo').value.trim(), sastojci = document.getElementById('sastojci').value.trim();
        const eb = document.getElementById('errorBox'), r = document.getElementById('results'), sp = document.getElementById('spinner'), b = document.getElementById('genBtn');
        eb.classList.remove('show'); r.style.display = 'none'; r.innerHTML = '';
        if (!jelo || !sastojci) { eb.textContent = 'Unesite naziv jela i sastojke.'; eb.classList.add('show'); return }
        sp.classList.add('show'); b.disabled = true;
        try {
            const re = await fetch('https://mojkucnisvet-github-io.vercel.app/api/index', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({modul:'knjiga-normativa',jelo,sastojci,rezim:'normativ'})});
            if (!re.ok) { const e = await re.json().catch(()=>({})); throw new Error(e.error||'Greska.') }
            const d = await re.json();
            prikaziNormativ(d, jelo);
        } catch (e) { eb.textContent = 'Greska: ' + e.message; eb.classList.add('show') }
        finally { sp.classList.remove('show'); b.disabled = false }
    }

    async function generateLonac() {
        const jelo = document.getElementById('jeloLonac').value.trim(), uk = document.getElementById('ukupneKolicine').value.trim();
        const eb = document.getElementById('errorBox'), r = document.getElementById('results'), sp = document.getElementById('spinner'), b = document.getElementById('genBtnLonac');
        eb.classList.remove('show'); r.style.display = 'none'; r.innerHTML = '';
        if (!jelo || !uk) { eb.textContent = 'Unesite naziv jela i ukupne kolicine.'; eb.classList.add('show'); return }
        sp.classList.add('show'); b.disabled = true;
        try {
            const re = await fetch('https://mojkucnisvet-github-io.vercel.app/api/index', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({modul:'knjiga-normativa',jelo,ukupneKolicine:uk,rezim:'lonac'})});
            if (!re.ok) { const e = await re.json().catch(()=>({})); throw new Error(e.error||'Greska.') }
            const d = await re.json();
            prikaziNormativ(d, jelo, true);
        } catch (e) { eb.textContent = 'Greska: ' + e.message; eb.classList.add('show') }
        finally { sp.classList.remove('show'); b.disabled = false }
    }

    function prikaziNormativ(data, jelo, izLonca = false) {
        const r = document.getElementById('results');
        const card = document.createElement('div'); card.className = 'result-card';
        let html = `<div class="header"><h3 style="color:#E65F19;">${jelo}</h3>`;
        if (izLonca && data.brojPorcija) html += `<div class="porcije">${data.brojPorcija} porcija</div>`;
        html += `</div><table class="normativ-table"><thead><tr><th>Namirnica</th><th>Kolicina po porciji</th></tr></thead><tbody>`;
        if (data.normativ && data.normativ.length > 0) {
            data.normativ.forEach(n => { html += `<tr><td>${n.namirnica}</td><td>${n.kolicinaPoPorciji} ${n.jedinica||'g'}</td></tr>`; });
        }
        html += `</tbody></table>`;
        card.innerHTML = html;
        r.appendChild(card);

        const actions = document.createElement('div'); actions.className = 'action-buttons';
        const copyBtn = document.createElement('button'); copyBtn.className = 'btn btn-secondary'; copyBtn.textContent = 'Kopiraj normativ';
        copyBtn.onclick = () => {
            let t = `${jelo}\n`;
            if (data.normativ) data.normativ.forEach(n => t += `${n.namirnica}: ${n.kolicinaPoPorciji} ${n.jedinica||'g'}\n`);
            navigator.clipboard.writeText(t).then(() => { copyBtn.textContent = 'Kopirano!'; setTimeout(() => copyBtn.textContent = 'Kopiraj normativ', 2000); });
        };
        actions.appendChild(copyBtn);
        r.appendChild(actions);
        r.style.display = 'block'; r.scrollIntoView({behavior:'smooth'});
    }
</script>

</body>
</html>
