<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meni Inženjer | AI Opisi Jela</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; display: flex; flex-direction: column; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .nav-back { text-decoration: none; color: #707E94; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; width: 100%; margin: 2rem auto; padding: 0 1.5rem; flex: 1; }
        .intro-section { text-align: center; margin-bottom: 2.5rem; }
        .intro-section h1 { font-size: 2.2rem; font-weight: 800; color: #FFFFFF; margin-bottom: 0.5rem; }
        .intro-section h1 span { color: #E65F19; }
        .intro-section p { color: #707E94; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem 1rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #E65F19; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
        .btn { width: 100%; padding: 0.9rem; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; border: none; }
        .btn-primary { background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .result-box { margin-top: 1.5rem; padding: 1.5rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; display: none; }
        .result-box.show { display: block; }
        .result-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid #222C38; }
        .result-badge { background-color: rgba(46, 204, 113, 0.15); color: #2ecc71; font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 6px; }
        .result-title { font-weight: 700; color: #FFFFFF; }
        .result-text { color: #CBD5E1; line-height: 1.6; font-size: 0.95rem; white-space: pre-wrap; }
        .result-detected { color: #E65F19; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 10px; color: #ef4444; font-size: 0.9rem; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; margin-top: auto; }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Nazad na Blog</a>
    <div class="brand-text">Meni<span>Inženjer</span></div>
</header>

<div class="container">
    <div class="intro-section">
        <h1>Meni <span>Inženjer</span></h1>
        <p>Unesite naziv jela ili samo sastojke – AI će generisati profesionalni opis.</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>🍽️ Naziv jela (opciono)</label>
            <input type="text" id="nazivJela" placeholder="Npr. Musaka, Sarma...">
        </div>

        <div class="form-group">
            <label>🥕 Sastojci (obavezno ako nema naziva)</label>
            <textarea id="sastojci" placeholder="Npr. krompir, mleveno meso, luk, začini..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>🏪 Vrsta restorana</label>
                <select id="restoran">
                    <option value="tradicionalni restoran">🥘 Tradicionalni / Nacionalni</option>
                    <option value="italijanski restoran">🍝 Italijanski</option>
                    <option value="fast food restoran">🍔 Fast Food</option>
                    <option value="moderni fjužn restoran">🥗 Moderni fjužn</option>
                    <option value="poslastičarnica">🍰 Poslastičarnica</option>
                    <option value="steakhouse">🥩 Steakhouse</option>
                </select>
            </div>

            <div class="form-group">
                <label>🎨 Nivo kreativnosti</label>
                <select id="kreativnost">
                    <option value="standardno">🥉 Klasičan</option>
                    <option value="kreativno" selected>🥈 Kreativan</option>
                    <option value="premium">🥇 Signature</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary" id="generateBtn" onclick="generateOpis()">⚡ Generiši opis jela</button>

        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <p style="margin-top: 0.5rem; color: #707E94;">AI piše opis...</p>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="result-box" id="resultBox">
            <div class="result-header">
                <span class="result-badge">✅ Generisano</span>
                <span class="result-title">Opis jela</span>
            </div>
            <div class="result-detected" id="detectedJelo"></div>
            <div class="result-text" id="resultText"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Meni Inženjer | Ugostiteljski AI Agent</p>
</footer>

<script>
    async function generateOpis() {
        const nazivJela = document.getElementById('nazivJela').value.trim();
        const sastojci = document.getElementById('sastojci').value.trim();
        const restoran = document.getElementById('restoran').value;
        const kreativnost = document.getElementById('kreativnost').value;

        const errorBox = document.getElementById('errorBox');
        const resultBox = document.getElementById('resultBox');
        const resultText = document.getElementById('resultText');
        const detectedJelo = document.getElementById('detectedJelo');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const generateBtn = document.getElementById('generateBtn');

        errorBox.classList.remove('show');
        resultBox.classList.remove('show');
        detectedJelo.textContent = '';

        if (!nazivJela && !sastojci) {
            errorBox.textContent = '⚠️ Unesite naziv jela ili bar nekoliko sastojaka.';
            errorBox.classList.add('show');
            return;
        }

        loadingSpinner.classList.add('show');
        generateBtn.disabled = true;

        try {
            // Šaljemo zahteve na tvoj novi API
            const response = await fetch('/api/generisi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jelo: nazivJela,
                    restoran: restoran,
                    sastojci: sastojci,
                    kreativnost: kreativnost
                })
            });

            const data = await response.json();

            if (!response.ok || data.error) {
                throw new Error(data.error || `Greška servera: ${response.status}`);
            }

            // Ako je AI prepoznao jelo (kada se unesu samo sastojci)
            if (data.detected_jelo) {
                detectedJelo.textContent = '🧠 AI prepoznato jelo: ' + data.detected_jelo;
            }

            // Prikaz opisa
            resultText.textContent = data.opis || 'Opis je uspešno kreiran!';
            resultBox.classList.add('show');

        } catch (error) {
            errorBox.textContent = '❌ Greška: ' + error.message;
            errorBox.classList.add('show');
        } finally {
            loadingSpinner.classList.remove('show');
            generateBtn.disabled = false;
        }
    }
</script>
</body>
</html>
