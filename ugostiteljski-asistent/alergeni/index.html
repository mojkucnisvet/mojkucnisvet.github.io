<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alergeni i nutritivne vrednosti | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        input:focus, textarea:focus { border-color: #E65F19; }
        textarea { resize: vertical; min-height: 60px; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .results { margin-top: 1.5rem; }
        .section-title { color: #E65F19; font-weight: 700; font-size: 1.1rem; margin-bottom: 0.75rem; margin-top: 1.5rem; }
        .alergen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.5rem; margin-bottom: 1.5rem; }
        .alergen-tag { padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 700; text-align: center; }
        .alergen-da { background-color: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .alergen-ne { background-color: rgba(46,204,113,0.1); color: #2ecc71; border: 1px solid rgba(46,204,113,0.15); }
        .nutrition-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
        .nutrition-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; padding: 1rem; text-align: center; }
        .nutrition-card .value { font-size: 1.3rem; font-weight: 700; color: #2ecc71; }
        .nutrition-card .label { color: #707E94; font-size: 0.75rem; margin-top: 0.3rem; text-transform: uppercase; }
        .oznaka-box { background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; padding: 1rem; color: #CBD5E1; font-size: 0.95rem; line-height: 1.6; }
        .oznaka-box strong { color: #E65F19; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">Alergeni<span>&Nutritivne</span></div>
</header>

<div class="container">
    <h1>Alergeni i <span>nutritivne vrednosti</span></h1>
    <p class="subtitle">Unesite jelo i sastojke (opciono sa gramažom). AI prepoznaje alergene i izračunava približne nutritivne vrednosti.</p>

    <div class="card">
        <div class="form-group">
            <label>Naziv jela</label>
            <input type="text" id="jelo" placeholder="Npr. Pileći file sa povrćem">
        </div>
        <div class="form-group">
            <label>Sastojci</label>
            <textarea id="sastojci" placeholder="Npr. pileći file 200g, pavlaka 50ml, brašno 30g, jaja 2 kom"></textarea>
            <p style="color:#4A5568;font-size:0.75rem;margin-top:0.3rem;">Možete uneti sa gramažom (preciznije) ili bez (brže).</p>
        </div>
        <button class="btn" id="analyzeBtn" onclick="analyze()">Analiziraj jelo</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">Analiziram...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    async function analyze() {
        const jelo = document.getElementById('jelo').value.trim();
        const sastojci = document.getElementById('sastojci').value.trim();

        const errorBox = document.getElementById('errorBox');
        const results = document.getElementById('results');
        const spinner = document.getElementById('spinner');
        const btn = document.getElementById('analyzeBtn');

        errorBox.classList.remove('show');
        results.style.display = 'none';
        results.innerHTML = '';

        if (!jelo) { errorBox.textContent = 'Unesite naziv jela.'; errorBox.classList.add('show'); return; }
        if (!sastojci) { errorBox.textContent = 'Unesite bar nekoliko sastojaka.'; errorBox.classList.add('show'); return; }

        spinner.classList.add('show');
        btn.disabled = true;
        btn.textContent = 'Analiziram...';

        try {
            const response = await fetch('https://mojkucnisvet-github-io.vercel.app/api/alergeni', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jelo, sastojci })
            });

            if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err.error || 'Greška.'); }

            const data = await response.json();

            // Fallback
            if (data.oznaka && (!data.alergeni || data.alergeni.length === 0) && (!data.nutritivneVrednosti || Object.keys(data.nutritivneVrednosti).length === 0)) {
                const box = document.createElement('div');
                box.className = 'oznaka-box';
                box.textContent = data.oznaka;
                results.appendChild(box);
                results.style.display = 'block';
                results.scrollIntoView({ behavior: 'smooth' });
                return;
            }

            // Alergeni — samo prisutni
            if (data.alergeni && data.alergeni.length > 0) {
                const prisutni = data.alergeni.filter(a => a.prisutan === true || a.alergen === 'da');
                
                const secTitle = document.createElement('div');
                secTitle.className = 'section-title';
                secTitle.textContent = 'Alergeni';
                results.appendChild(secTitle);

                if (prisutni.length > 0) {
                    const grid = document.createElement('div');
                    grid.className = 'alergen-grid';
                    prisutni.forEach(a => {
                        const tag = document.createElement('div');
                        tag.className = 'alergen-tag alergen-da';
                        tag.innerHTML = `${a.naziv}${a.sastojak ? '<br><small>(' + a.sastojak + ')</small>' : ''}`;
                        grid.appendChild(tag);
                    });
                    results.appendChild(grid);
                } else {
                    const box = document.createElement('div');
                    box.className = 'oznaka-box';
                    box.style.cssText = 'color:#2ecc71;';
                    box.textContent = 'U ovom jelu nisu pronađeni alergeni iz zakonske liste.';
                    results.appendChild(box);
                }
            }

            // Nutritivne vrednosti
            if (data.nutritivneVrednosti && Object.keys(data.nutritivneVrednosti).length > 0) {
                const secTitle = document.createElement('div');
                secTitle.className = 'section-title';
                secTitle.textContent = 'Nutritivne vrednosti (po porciji)';
                results.appendChild(secTitle);

                const grid = document.createElement('div');
                grid.className = 'nutrition-grid';
                const nv = data.nutritivneVrednosti;
                const labelMap = { kalorije: 'Kalorije', proteini: 'Proteini', masti: 'Masti', ugljeniHidrati: 'Ugljeni hidrati' };
                for (const [key, val] of Object.entries(nv)) {
                    const card = document.createElement('div');
                    card.className = 'nutrition-card';
                    card.innerHTML = `<div class="value">${val}</div><div class="label">${labelMap[key] || key}</div>`;
                    grid.appendChild(card);
                }
                results.appendChild(grid);
            }

            // Oznaka
            if (data.oznaka) {
                const secTitle = document.createElement('div');
                secTitle.className = 'section-title';
                secTitle.textContent = 'Oznaka';
                results.appendChild(secTitle);

                const box = document.createElement('div');
                box.className = 'oznaka-box';
                box.textContent = data.oznaka;
                results.appendChild(box);
            }

            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            errorBox.textContent = 'Greška: ' + error.message;
            errorBox.classList.add('show');
        } finally {
            spinner.classList.remove('show');
            btn.disabled = false;
            btn.textContent = 'Analiziraj jelo';
        }
    }
</script>

</body>
</html>
