<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV i marža | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        input { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        input:focus { border-color: #E65F19; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .checkbox-group input { width: auto; }
        .checkbox-group label { font-size: 0.9rem; color: #94A3B8; text-transform: none; margin-bottom: 0; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .results { margin-top: 1.5rem; }
        .result-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; text-align: center; }
        .result-card .big-number { font-size: 2.5rem; font-weight: 800; color: #2ecc71; }
        .result-card .big-number.orange { color: #E65F19; }
        .result-card .label { color: #707E94; font-size: 0.75rem; text-transform: uppercase; margin-top: 0.3rem; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .detail-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; padding: 1rem; text-align: center; }
        .detail-card .value { font-size: 1.3rem; font-weight: 700; color: #CBD5E1; }
        .detail-card .label { color: #707E94; font-size: 0.7rem; text-transform: uppercase; margin-top: 0.2rem; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">PDV<span>&Marža</span></div>
</header>

<div class="container">
    <h1>PDV i <span>marža</span></h1>
    <p class="subtitle">Unesite nabavnu cenu jela, maržu i PDV stopu. Kalkulator izračunava konačnu cenu i profit.</p>

    <div class="card">
        <div class="form-group"><label>Nabavna cena jela</label><input type="number" id="nabavnaCena" placeholder="Npr. 350" step="0.01"></div>
        <div class="checkbox-group"><input type="checkbox" id="cenaSadrziPDV"><label for="cenaSadrziPDV">Nabavna cena sadrži PDV</label></div>
        <div class="row">
            <div class="form-group"><label>Marža (%)</label><input type="number" id="marza" placeholder="Npr. 200" value="200" step="1"></div>
            <div class="form-group"><label>PDV stopa (%)</label><input type="number" id="pdvStopa" placeholder="Npr. 20" value="20" step="0.1"></div>
        </div>
        <button class="btn" id="calcBtn" onclick="calculate()">Izračunaj</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">Računam...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    async function calculate() {
        const nabavnaCena=document.getElementById('nabavnaCena').value.trim(),cenaSadrziPDV=document.getElementById('cenaSadrziPDV').checked,marza=document.getElementById('marza').value.trim(),pdvStopa=document.getElementById('pdvStopa').value.trim();
        const errorBox=document.getElementById('errorBox'),results=document.getElementById('results'),spinner=document.getElementById('spinner'),btn=document.getElementById('calcBtn');
        errorBox.classList.remove('show');results.style.display='none';results.innerHTML='';
        if(!nabavnaCena){errorBox.textContent='Unesite nabavnu cenu.';errorBox.classList.add('show');return}
        if(!marza){errorBox.textContent='Unesite maržu.';errorBox.classList.add('show');return}
        spinner.classList.add('show');btn.disabled=true;btn.textContent='Računam...';
        try{
            const r=await fetch('https://mojkucnisvet-github-io.vercel.app/api/index',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({modul:'pdv-marza',nabavnaCena,cenaSadrziPDV,marza,pdvStopa})});
            if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Greška.')}
            const d=await r.json();
            const mc=document.createElement('div');mc.className='result-card';mc.innerHTML=`<div class="big-number orange">${d.konacnaCena}</div><div class="label">Konačna prodajna cena (sa PDV-om)</div>`;results.appendChild(mc);
            const dg=document.createElement('div');dg.className='detail-grid';dg.innerHTML=`<div class="detail-card"><div class="value">${d.osnovica}</div><div class="label">Osnovica (bez PDV-a)</div></div><div class="detail-card"><div class="value">${d.prodajnaBezPDV}</div><div class="label">Prodajna cena (bez PDV-a)</div></div><div class="detail-card"><div class="value">${d.pdvIznos}</div><div class="label">Iznos PDV-a (${d.pdvProcenat}%)</div></div><div class="detail-card"><div class="value" style="color:#2ecc71;">${d.profit}</div><div class="label">Neto profit (marža ${d.marzaProcenat}%)</div></div>`;results.appendChild(dg);
            results.style.display='block';results.scrollIntoView({behavior:'smooth'});
        }catch(e){errorBox.textContent='Greška: '+e.message;errorBox.classList.add('show')}
        finally{spinner.classList.remove('show');btn.disabled=false;btn.textContent='Izračunaj'}
    }
</script>

</body>
</html>
