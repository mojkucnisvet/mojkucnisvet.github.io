<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cenovna strategija | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #E65F19; }
        textarea { resize: vertical; min-height: 60px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .results { margin-top: 1.5rem; }
        .predlog-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 0.75rem; }
        .predlog-card .cena { font-size: 2rem; font-weight: 800; color: #E65F19; }
        .predlog-card .strategija { font-size: 1rem; font-weight: 700; color: #FFFFFF; margin: 0.3rem 0; }
        .predlog-card .zasto { color: #CBD5E1; font-size: 0.9rem; }
        .savet-box { background-color: #0F1319; border: 1px solid rgba(230,95,25,0.2); border-radius: 14px; padding: 1.5rem; margin-top: 1.5rem; }
        .savet-box .savet-title { font-size: 1rem; font-weight: 700; color: #E65F19; margin-bottom: 0.5rem; }
        .savet-box .savet-text { color: #CBD5E1; font-size: 0.95rem; line-height: 1.5; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
        @media (max-width: 600px) { .row, .row3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">Cenovna<span>Strategija</span></div>
</header>

<div class="container">
    <h1>Cenovna <span>strategija</span></h1>
    <p class="subtitle">Unesite trenutnu cenu. AI predlaže tri psihološke cene prilagođene nivou vašeg objekta.</p>

    <div class="card">
        <div class="form-group"><label>Naziv jela/pića (opciono)</label><input type="text" id="naziv" placeholder="Npr. Biftek, Teleća čorba..."></div>
        <div class="row3">
            <div class="form-group"><label>Prodajna cena</label><input type="number" id="cena" placeholder="Npr. 1155" step="0.01"></div>
            <div class="form-group"><label>Kategorija jela</label><select id="kategorija"><option value="">Izaberite</option><option value="Predjelo">Predjelo</option><option value="Glavno jelo" selected>Glavno jelo</option><option value="Desert">Desert</option><option value="Piće">Piće</option></select></div>
            <div class="form-group"><label>Nivo objekta</label><select id="zvezdice"><option value="">Izaberite</option><option value="1">★ Brza hrana / kiosk</option><option value="2" selected>★★ Kafana / bistro</option><option value="3">★★★ Restoran srednje klase</option><option value="4">★★★★ Premium restoran</option><option value="5">★★★★★ Lux / fine dining</option></select></div>
        </div>
        <div class="form-group"><label>Dodatne informacije (opciono)</label><textarea id="dodatno" placeholder="Npr. vikend cena, happy hour, dostava..."></textarea></div>
        <button class="btn" id="stratBtn" onclick="analiziraj()">Predloži cene</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">Analiziram...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    async function analiziraj() {
        const naziv = document.getElementById('naziv').value.trim();
        const cena = document.getElementById('cena').value.trim();
        const kategorija = document.getElementById('kategorija').value;
        const zvezdice = document.getElementById('zvezdice').value;
        const dodatno = document.getElementById('dodatno').value.trim();

        const errorBox = document.getElementById('errorBox');
        const results = document.getElementById('results');
        const spinner = document.getElementById('spinner');
        const btn = document.getElementById('stratBtn');

        errorBox.classList.remove('show');
        results.style.display = 'none';
        results.innerHTML = '';

        if (!cena) { errorBox.textContent = 'Unesite prodajnu cenu.'; errorBox.classList.add('show'); return; }

        spinner.classList.add('show');
        btn.disabled = true;
        btn.textContent = 'Analiziram...';

        try {
            const response = await fetch('https://mojkucnisvet-github-io.vercel.app/api/index', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ modul: 'cenovna-strategija', naziv, cena, kategorija, zvezdice, dodatno })
            });

            if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err.error || 'Greška.'); }

            const data = await response.json();

            if (data.predlozi && data.predlozi.length > 0) {
                data.predlozi.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'predlog-card';
                    card.innerHTML = `<div class="cena">${p.cena}</div><div class="strategija">${p.strategija}</div><div class="zasto">${p.zasto}</div>`;
                    results.appendChild(card);
                });
            }

            if (data.savet) {
                const savet = document.createElement('div');
                savet.className = 'savet-box';
                savet.innerHTML = `<div class="savet-title">Savet</div><div class="savet-text">${data.savet}</div>`;
                results.appendChild(savet);
            }

            if (data.objasnjenje) {
                const obj = document.createElement('div');
                obj.className = 'savet-box';
                obj.style.borderColor = 'rgba(46,204,113,0.2)';
                obj.innerHTML = `<div class="savet-title" style="color:#2ecc71;">Objašnjenje</div><div class="savet-text">${data.objasnjenje}</div>`;
                results.appendChild(obj);
            }

            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            errorBox.textContent = 'Greška: ' + error.message;
            errorBox.classList.add('show');
        } finally {
            spinner.classList.remove('show');
            btn.disabled = false;
            btn.textContent = 'Predloži cene';
        }
    }
</script>

</body>
</html>
