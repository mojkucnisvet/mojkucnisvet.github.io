<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meni Inženjer - Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #12181F; color: #E2E8F0; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Premium Header */
        header { background-color: #1A2229; border-bottom: 1px solid #2D3741; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        
        .nav-back { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: #94A3B8; font-size: 0.9rem; font-weight: 500; transition: color 0.3s; }
        .nav-back:hover { color: #E65F19; }

        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo-svg { width: 40px; height: 40px; fill: #E65F19; }
        .logo-text h1 { font-size: 1.2rem; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; }
        .logo-text h1 span { color: #E65F19; }
        .logo-text p { font-size: 0.7rem; color: #94A3B8; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        
        .container { max-width: 800px; width: 100%; margin: 2rem auto; padding: 0 1.5rem; flex: 1; }
        .app-card { background-color: #1A2229; border: 1px solid #2D3741; border-radius: 20px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .intro { margin-bottom: 2rem; border-bottom: 1px solid #2D3741; padding-bottom: 1.5rem; }
        .intro h2 { font-size: 1.8rem; color: #FFFFFF; margin-bottom: 0.5rem; }
        .intro p { color: #94A3B8; font-size: 1rem; line-height: 1.5; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.9rem; font-weight: 600; color: #94A3B8; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], textarea, select { width: 100%; background-color: #12181F; border: 1px solid #2D3741; border-radius: 12px; padding: 1rem; color: #FFFFFF; font-size: 1rem; transition: all 0.3s; }
        input[type="text"]:focus, textarea:focus, select:focus { border-color: #E65F19; outline: none; box-shadow: 0 0 0 3px rgba(230,95,25,0.15); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        
        .btn-submit { width: 100%; background: linear-gradient(135deg, #E65F19, #CF5112); color: white; border: none; border-radius: 12px; padding: 1.2rem; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 20px rgba(230,95,25,0.2); margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(230,95,25,0.4); }
        .btn-submit:disabled { background: #2D3741; color: #64748B; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-box { margin-top: 2rem; background-color: #12181F; border-left: 4px solid #E65F19; border-radius: 0 12px 12px 0; padding: 1.5rem; display: none; }
        .result-box h3 { font-size: 0.9rem; color: #E65F19; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .result-text { font-size: 1.1rem; color: #F1F5F9; line-height: 1.6; white-space: pre-wrap; }

        footer { text-align: center; padding: 2rem; color: #64748B; font-size: 0.9rem; border-top: 1px solid #1A2229; margin-top: auto; }
        
        @media (max-width: 600px) {
            header { padding: 1rem; flex-direction: column; gap: 1rem; text-align: center; }
            .grid-2 { grid-template-columns: 1fr; gap: 0; }
            .container { margin: 1rem auto; }
        }
    </style>
</head>
<body>

<header>
    <a href="../../index.html" class="nav-back">
        <span>← Povratak na Blog</span>
    </a>

    <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 100 100">
            <path d="M20,50 C20,35 35,20 50,20 C65,20 80,35 80,50 C80,65 65,80 50,80 C35,80 20,65 20,50 Z" fill="none" stroke="#E65F19" stroke-width="4"/>
            <path d="M35,45 C35,45 42,35 50,35 C58,35 65,45 65,45 C65,45 65,55 50,55 C35,55 35,45 35,45 Z" fill="#E65F19"/>
            <path d="M40,55 L40,70 L45,72 L50,70 L55,72 L60,70 L60,55" fill="none" stroke="#E65F19" stroke-width="3"/>
            <circle cx="43" cy="45" r="2" fill="#1A2229"/>
            <circle cx="57" cy="45" r="2" fill="#1A2229"/>
            <path d="M30,32 C35,25 42,28 50,28 C58,28 65,25 70,32 C72,35 68,38 65,37 C58,35 42,35 35,37 C32,38 28,35 30,32 Z" fill="#FFFFFF"/>
        </svg>
        <div class="logo-text">
            <h1>Meni<span>Inženjer</span></h1>
            <p>Ugostiteljski AI Agent</p>
        </div>
    </div>
</header>

<div class="container">
    <div class="app-card">
        <div class="intro">
            <h2>Kreirajte Opis Jelovnika</h2>
            <p>Unesite naziv jela ili ključne sastojke. AI će sam prepoznati jelo i generisati profesionalan opis.</p>
        </div>

        <div class="form-group">
            <label for="jelo">Naziv Jela</label>
            <input type="text" id="jelo" placeholder="Npr. Sarma, Biftek...">
        </div>

        <div class="form-group">
            <label for="sastojci">Ključni sastojci (AI prepoznaje jelo ako je naziv prazan)</label>
            <textarea id="sastojci" rows="3" placeholder="Npr. juneći biftek, senf, biber..."></textarea>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label for="restoran">Kategorija</label>
                <select id="restoran">
                    <option value="Nacionalni/Tradicionalni">Nacionalni</option>
                    <option value="Italijanski">Italijanski</option>
                    <option value="Picerija">Picerija</option>
                    <option value="Street & Fast Food">Street & Fast Food</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kreativnost">Format</label>
                <select id="kreativnost">
                    <option value="ekonomičan">Kratko</option>
                    <option value="standardan" selected>Standardno</option>
                    <option value="visoka">Gurmanski</option>
                </select>
            </div>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="generisiOpis()">
            <div class="spinner" id="btnSpinner"></div>
            <span id="btnText">Generiši Opis Jela</span>
        </button>

        <div class="result-box" id="resultBox">
            <h3>Predlog za meni:</h3>
            <div class="result-text" id="resultText"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Meni Inženjer — Razvijeno u saradnji sa Moj Kućni Svet.</p>
</footer>

<script>
    async function generisiOpis() {
        const jelo = document.getElementById('jelo').value.trim();
        const sastojci = document.getElementById('sastojci').value.trim();
        const restoran = document.getElementById('restoran').value;
        const kreativnost = document.getElementById('kreativnost').value;

        if (!jelo && !sastojci) {
            alert('Molimo unesite naziv jela ili sastojke.');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const resultBox = document.getElementById('resultBox');
        const resultText = document.getElementById('resultText');

        submitBtn.disabled = true;
        btnSpinner.style.display = 'block';
        btnText.innerText = 'Razmišljam...';
        resultBox.style.display = 'none';

        try {
            const response = await fetch('/api/generisi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jelo, sastojci, restoran, kreativnost })
            });
            const data = await response.json();
            if (data.success) {
                resultText.innerText = data.opis;
                resultBox.style.display = 'block';
                resultBox.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('Greška: ' + data.error);
            }
        } catch (error) {
            alert('Greška u komunikaciji sa serverom.');
        } finally {
            submitBtn.disabled = false;
            btnSpinner.style.display = 'none';
            btnText.innerText = 'Generiši Opis Jela';
        }
    }
</script>

</body>
</html>
