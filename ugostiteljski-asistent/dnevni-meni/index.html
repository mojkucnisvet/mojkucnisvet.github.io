<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnevni meni generator | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #E65F19; }
        textarea { resize: vertical; min-height: 60px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .results { margin-top: 1.5rem; }
        .result-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 0.75rem; }
        .result-card .kategorija { color: #707E94; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 0.3rem; }
        .result-card .jelo-naziv { font-size: 1.2rem; font-weight: 700; color: #E65F19; margin-bottom: 0.3rem; }
        .result-card .jelo-opis { color: #CBD5E1; font-size: 0.9rem; margin-bottom: 0.3rem; }
        .result-card .jelo-cena { font-size: 1rem; font-weight: 700; color: #2ecc71; }
        .napomena { background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; padding: 1rem; color: #94A3B8; font-size: 0.9rem; margin-top: 1rem; font-style: italic; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">Dnevni<span>Meni</span></div>
</header>

<div class="container">
    <h1>Dnevni <span>Meni Generator</span></h1>
    <p class="subtitle">Izaberite vrstu restorana i broj jela — AI kreira kompletan dnevni meni sa opisima i cenama za 3 sekunde.</p>

    <div class="card">
        <div class="form-group">
            <label>Vrsta restorana</label>
            <select id="restoran">
                <option value="tradicionalni restoran">Tradicionalni / Nacionalni</option>
                <option value="italijanski restoran">Italijanski</option>
                <option value="japanski restoran">Japanski / Sushi</option>
                <option value="fast food">Street & Fast Food</option>
                <option value="moderni fjužn">Moderni fjužn</option>
                <option value="kafić">Kafić</option>
                <option value="poslastičarnica">Poslastičarnica</option>
                <option value="bar">Bar / Koktel bar</option>
                <option value="hotelski restoran">Hotelski restoran</option>
                <option value="steakhouse">Steakhouse</option>
                <option value="kineski restoran">Kineski</option>
                <option value="indijski restoran">Indijski</option>
                <option value="francuski restoran">Francuski</option>
                <option value="grčki restoran">Grčki / Mediteranski</option>
                <option value="pekara">Pekara</option>
                <option value="meksički restoran">Meksički</option>
                <option value="picerija">Picerija</option>
                <option value="vegan restoran">Vegan / Vegetarijanski</option>
                <option value="tajlandski restoran">Tajlandski / Vijetnamski</option>
            </select>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Broj jela</label>
                <select id="brojJela">
                    <option value="3">3 jela (predjelo, glavno, desert)</option>
                    <option value="4" selected>4 jela (predjelo, supa, glavno, desert)</option>
                    <option value="5">5 jela (predjelo, supa, glavno, desert, piće)</option>
                    <option value="6">6 jela (predjelo, supa, glavno, salata, desert, piće)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Budžet po osobi (opciono)</label>
                <input type="text" id="budzet" placeholder="Npr. 1500 RSD, nije ograničen...">
            </div>
        </div>
        <div class="form-group">
            <label>Posebni zahtevi (opciono)</label>
            <textarea id="zahtevi" placeholder="Npr. bez svinjetine, posni meni, sezonski..."></textarea>
        </div>
        <button class="btn" id="generateBtn" onclick="generate()">Generiši dnevni meni</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">AI kreira meni...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    async function generate() {
        const restoran = document.getElementById('restoran').value;
        const brojJela = document.getElementById('brojJela').value;
        const budzet = document.getElementById('budzet').value.trim();
        const zahtevi = document.getElementById('zahtevi').value.trim();

        const errorBox = document.getElementById('errorBox');
        const results = document.getElementById('results');
        const spinner = document.getElementById('spinner');
        const btn = document.getElementById('generateBtn');

        errorBox.classList.remove('show');
        results.style.display = 'none';
        results.innerHTML = '';

        spinner.classList.add('show');
        btn.disabled = true;
        btn.textContent = 'Kreiram meni...';

        try {
            const response = await fetch('https://mojkucnisvet-github-io.vercel.app/api/dnevni-meni', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ restoran, brojJela, budzet, zahtevi })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error || 'Greška na serveru.');
            }

            const data = await response.json();

            if (data.meni && data.meni.length > 0) {
                data.meni.forEach(j => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <div class="kategorija">${j.kategorija || ''}</div>
                        <div class="jelo-naziv">${j.jelo || ''}</div>
                        <div class="jelo-opis">${j.opis || ''}</div>
                        <div class="jelo-cena">${j.cena || ''}</div>
                    `;
                    results.appendChild(card);
                });

                if (data.napomena) {
                    const nap = document.createElement('div');
                    nap.className = 'napomena';
                    nap.textContent = data.napomena;
                    results.appendChild(nap);
                }

                results.style.display = 'block';
                results.scrollIntoView({ behavior: 'smooth' });
            } else {
                throw new Error('Nema jela u meniju.');
            }

        } catch (error) {
            errorBox.textContent = 'Greška: ' + error.message;
            errorBox.classList.add('show');
        } finally {
            spinner.classList.remove('show');
            btn.disabled = false;
            btn.textContent = 'Generiši dnevni meni';
        }
    }
</script>

</body>
</html>
