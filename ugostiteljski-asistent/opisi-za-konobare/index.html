<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opisi za osoblje | Ugostiteljski AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0F1319; color: #E2E8F0; min-height: 100vh; }
        header { background-color: #161C24; border-bottom: 1px solid #222C38; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .nav-back { color: #707E94; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-back:hover { color: #E65F19; }
        .brand-text { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .brand-text span { color: #E65F19; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #E65F19; }
        .subtitle { text-align: center; color: #707E94; margin-bottom: 2rem; }
        .card { background-color: #161C24; border: 1px solid #222C38; border-radius: 20px; padding: 1.8rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #E65F19; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #94A3B8; margin-bottom: 0.4rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 0.8rem; background-color: #0F1319; border: 1px solid #222C38; border-radius: 10px; color: #E2E8F0; font-size: 0.95rem; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #E65F19; }
        textarea { resize: vertical; min-height: 60px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #E65F19, #CF5112); color: #FFFFFF; margin-top: 0.5rem; }
        .btn:hover { box-shadow: 0 6px 20px rgba(230,95,25,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .results { margin-top: 1.5rem; }
        .recenica-card { background-color: #0F1319; border: 1px solid #222C38; border-radius: 14px; padding: 1.5rem; margin-bottom: 0.75rem; }
        .recenica-card .situacija { font-size: 0.75rem; color: #707E94; text-transform: uppercase; margin-bottom: 0.5rem; }
        .recenica-card .tekst { font-size: 1.2rem; color: #E65F19; font-weight: 700; line-height: 1.5; font-style: italic; }
        .savet-box { background-color: #0F1319; border: 1px solid rgba(46,204,113,0.2); border-radius: 14px; padding: 1.5rem; margin-top: 1.5rem; }
        .savet-box .savet-title { font-size: 1rem; font-weight: 700; color: #2ecc71; margin-bottom: 0.5rem; }
        .savet-box .savet-text { color: #CBD5E1; font-size: 0.95rem; line-height: 1.5; }
        .error-box { margin-top: 1rem; padding: 1rem; background-color: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: #ef4444; display: none; }
        .error-box.show { display: block; }
        .loading-spinner { display: none; text-align: center; padding: 1rem; }
        .loading-spinner.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222C38; border-top: 3px solid #E65F19; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; color: #4A5568; font-size: 0.85rem; }
        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="nav-back">← Kontrolna Tabla</a>
    <div class="brand-text">Opisi<span>Osoblje</span></div>
</header>

<div class="container">
    <h1>Opisi za <span>osoblje</span></h1>
    <p class="subtitle">Generišite kratke, prodajne rečenice za konobare, somelijere i barmene.</p>

    <div class="card">
        <div class="form-group"><label>Naziv jela/pića</label><input type="text" id="jelo" placeholder="Npr. Biftek u sosu od crnog vina"></div>
        <div class="form-group"><label>Opis (opciono)</label><textarea id="opis" placeholder="Npr. Sočni goveđi biftek sa redukovanim sosom..."></textarea></div>
        <div class="row">
            <div class="form-group"><label>Tip osoblja</label><select id="tip"><option value="Konobar" selected>Konobar</option><option value="Somelijer">Somelijer</option><option value="Barmen">Barmen</option></select></div>
            <div class="form-group"><label>Kontekst</label><select id="kontekst"><option value="Standardna preporuka" selected>Standardna preporuka</option><option value="Večera za dvoje">Večera za dvoje</option><option value="Poslovni ručak">Poslovni ručak</option><option value="Proslava">Proslava</option><option value="Brzi ručak">Brzi ručak</option></select></div>
        </div>
        <button class="btn" id="genBtn" onclick="generate()">Generiši rečenice</button>
    </div>

    <div class="loading-spinner" id="spinner"><div class="spinner"></div><p style="color:#707E94;margin-top:0.5rem;">Smišljam rečenice...</p></div>
    <div class="error-box" id="errorBox"></div>
    <div class="results" id="results" style="display:none;"></div>
</div>

<footer>© 2026 Ugostiteljski AI Agent</footer>

<script>
    async function generate() {
        const jelo=document.getElementById('jelo').value.trim(),opis=document.getElementById('opis').value.trim(),tip=document.getElementById('tip').value,kontekst=document.getElementById('kontekst').value;
        const errorBox=document.getElementById('errorBox'),results=document.getElementById('results'),spinner=document.getElementById('spinner'),btn=document.getElementById('genBtn');
        errorBox.classList.remove('show');results.style.display='none';results.innerHTML='';
        if(!jelo){errorBox.textContent='Unesite naziv jela ili pića.';errorBox.classList.add('show');return}
        spinner.classList.add('show');btn.disabled=true;btn.textContent='Smišljam...';
        try{
            const r=await fetch('https://mojkucnisvet-github-io.vercel.app/api/index',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({modul:'opisi-za-konobare',jelo,opis,tip,kontekst})});
            if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Greška.')}
            const d=await r.json();
            if(d.recenice&&d.recenice.length>0){d.recenice.forEach(r=>{const c=document.createElement('div');c.className='recenica-card';c.innerHTML=`<div class="situacija">${r.situacija}</div><div class="tekst">"${r.recenica}"</div>`;results.appendChild(c)})}
            if(d.savet){const b=document.createElement('div');b.className='savet-box';b.innerHTML=`<div class="savet-title">Savet</div><div class="savet-text">${d.savet}</div>`;results.appendChild(b)}
            results.style.display='block';results.scrollIntoView({behavior:'smooth'});
        }catch(e){errorBox.textContent='Greška: '+e.message;errorBox.classList.add('show')}
        finally{spinner.classList.remove('show');btn.disabled=false;btn.textContent='Generiši rečenice'}
    }
</script>

</body>
</html>
