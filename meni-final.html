<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Meni Inženjer – Radi sigurno</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 1rem; }
        input, select, button { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
        .result { background: #f3f4f6; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        button { background: #2d6a4f; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🍽️ Meni Inženjer</h1>
    <label>Naziv jela:</label>
    <input type="text" id="jelo" value="Musaka">
    <label>Restoran:</label>
    <select id="restoran">
        <option>Balkanska kuća</option>
        <option>Italijanski restoran</option>
        <option>Fast food</option>
    </select>
    <label>Sastojci:</label>
    <input type="text" id="sastojci" value="krompir, mleveno meso">
    <label>Kreativnost (1-3):</label>
    <input type="number" id="kreativnost" value="2" min="1" max="3">
    <button id="dugme">Generiši opis</button>
    <div class="result" id="rezultat" style="display:none;"></div>

    <script>
        // KORISTIMO CORS PROXY ZA TVOJ PIPEDREAM URL
        const PROXY_URL = "https://corsproxy.io/?url=";
        const PIPEDREAM_URL = "https://eozsw312b5tnw28.m.pipedream.net";

        document.getElementById('dugme').onclick = async () => {
            const jelo = document.getElementById('jelo').value;
            const restoran = document.getElementById('restoran').value;
            const sastojci = document.getElementById('sastojci').value;
            const kreativnost = document.getElementById('kreativnost').value;

            const resultDiv = document.getElementById('rezultat');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = "⏳ Šaljem zahtev...";

            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(PIPEDREAM_URL), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ jelo, restoran, sastojci, kreativnost })
                });
                const data = await response.json();
                if (data.opis) {
                    resultDiv.innerHTML = `<strong>Opis:</strong><br>${data.opis}`;
                } else {
                    resultDiv.innerHTML = `<span style="color:red;">Greška: ${data.error || "Nepoznat odgovor"}</span>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<span style="color:red;">Greška: ${err.message}</span>`;
            }
        };
    </script>
</body>
</html>
